bundle:
  name: uc-ai-descriptions

variables:
  warehouse_id:
    description: "SQL warehouse ID (leave empty for auto-detect)"
    default: ""
  serving_endpoint:
    description: "Foundation Model API serving endpoint name"
    default: "databricks-claude-sonnet-4-6"
  app_title:
    description: "Display title for the app"
    default: "Unity Catalog AI Descriptions"
  # Optional: set to a Service Principal application ID (UUID) to run the app as that SP.
  # If left empty, Databricks auto-generates a dedicated SP for the app.
  service_principal_id:
    description: "Service Principal application ID to run the app as (leave empty to auto-generate)"
    default: ""

resources:
  apps:
    uc-ai-descriptions:
      name: uc-ai-descriptions
      description: "AI-powered UC table/column descriptions with human-in-the-loop review"
      source_code_path: ./
      # Uncomment and set var.service_principal_id to run as a specific existing SP.
      # If omitted, Databricks creates a dedicated SP automatically on first deploy.
      # run_as:
      #   service_principal_name: ${var.service_principal_id}
      # user_api_scopes set via API (Terraform provider bug prevents setting here)
      # user_api_scopes:
      #   - sql
      config:
        command:
          - python
          - -m
          - uvicorn
          - "app:app"
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "8000"
        env:
          - name: SERVING_ENDPOINT
            value: ${var.serving_endpoint}
          - name: WAREHOUSE_ID
            value: ${var.warehouse_id}
          - name: APP_TITLE
            value: ${var.app_title}

targets:
  dev:
    default: true
  prod:
    variables:
      serving_endpoint: "databricks-claude-sonnet-4-6"
