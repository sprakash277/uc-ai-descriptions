responsible_ai_rules: |
  - Never include PII field names or example values in descriptions.
  - Use business-friendly language suitable for a data catalog audience.
  - Do not reference internal system names or implementation details.

audit:
  table: "governance.ai_descriptions.audit_log"

exclusions:
  catalogs:
    - "__databricks_internal"
    - "system"
  schemas:
    - "information_schema"

# Opt-in reference-doc RAG. Leave volume_path empty to disable (default behaviour).
# When set, the app reads .md/.txt/.pdf files from the Volume, BM25-indexes them
# in memory, and splices the top_k relevant chunks into the generate prompt.
reference:
  volume_path: "/Volumes/main/default/uc_ai_reference_docs"
  top_k: 3
