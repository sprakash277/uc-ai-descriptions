responsible_ai_rules: |
  - Never include PII field names or example values in descriptions.
  - Use business-friendly language suitable for a data catalog audience.
  - Do not reference internal system names or implementation details.

audit:
  # IMPORTANT: change this to a catalog.schema you own before deploying.
  # The SP needs USE CATALOG + CREATE SCHEMA + CREATE TABLE + MODIFY on the
  # catalog/schema — see README Step 6.2. If these grants are missing, the
  # app still starts but audit writes are disabled (see "ERROR server.audit"
  # in the app logs).
  table: "main.default.uc_ai_descriptions_audit_log"

exclusions:
  catalogs:
    - "__databricks_internal"
    - "system"
  schemas:
    - "information_schema"

# Per-schema reference docs (opt-in).
# When volume_name is set, the app looks for reference docs in
# /Volumes/<catalog>/<schema>/<volume_name>/ for every generate call.
# PDFs are parsed via ai_parse_document; .md/.txt read natively.
# Governance: the schema owner grants READ VOLUME on their own Volume
# to the app service principal.
reference:
  volume_name: "reference_docs"
  per_doc_max_chars: 8000
  total_max_chars: 40000
